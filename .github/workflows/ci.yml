name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      smoke_target:
        description: "Select smoke tests to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - flask
          - fastapi

jobs:
  lint-syntax-and-tests:
    name: Lint, Syntax, and Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate Python syntax
        run: |
          python -m compileall backend

      - name: Frontend file sanity check
        run: |
          test -f frontend/index.html
          test -f frontend/app.js
          test -f frontend/styles.css

      - name: Run pytest
        run: |
          python -m pytest -q

  docker-build-smoke-test:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: lint-syntax-and-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t goal-manager:ci .

      - name: Run container for smoke check
        run: |
          docker run -d --name goal-manager-ci -p 8000:8000 goal-manager:ci
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:8000/api/goals > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Container did not become ready"
          docker logs goal-manager-ci
          exit 1

      - name: Stop container
        if: always()
        run: |
          docker rm -f goal-manager-ci || true

  flask-smoke-test:
    name: Flask API Smoke Test
    runs-on: ubuntu-latest
    needs: lint-syntax-and-tests
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.smoke_target == 'all' || github.event.inputs.smoke_target == 'flask'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Flask app
        run: |
          python backend/flask_app/app.py > flask.log 2>&1 &
          echo $! > flask.pid

      - name: Wait for Flask to become ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:5000/api/goals > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Flask did not start in time"
          cat flask.log
          exit 1

      - name: Smoke test Flask API
        run: |
          python - <<'PY'
          import json
          import urllib.request

          def req(method, url, data=None):
            body = None
            headers = {}
            if data is not None:
              body = json.dumps(data).encode("utf-8")
              headers["Content-Type"] = "application/json"
            r = urllib.request.Request(url, data=body, method=method, headers=headers)
            with urllib.request.urlopen(r, timeout=10) as resp:
              return resp.status, json.loads(resp.read().decode("utf-8"))

          status, goals = req("GET", "http://127.0.0.1:5000/api/goals")
          assert status == 200, status
          assert isinstance(goals, list), type(goals)

          status, created = req(
            "POST",
            "http://127.0.0.1:5000/api/goals",
            {
              "title": "CI test goal",
              "description": "created by github actions",
              "target_date": "2026-03-30"
            },
          )
          assert status == 201, status
          assert created["title"] == "CI test goal", created
          print("Flask smoke test passed")
          PY

      - name: Stop Flask app
        if: always()
        run: |
          kill "$(cat flask.pid)" || true

  fastapi-smoke-test:
    name: FastAPI API Smoke Test
    runs-on: ubuntu-latest
    needs: lint-syntax-and-tests
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.smoke_target == 'all' || github.event.inputs.smoke_target == 'fastapi'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start FastAPI app
        run: |
          uvicorn backend.fastapi_app.main:app --host 127.0.0.1 --port 8000 > fastapi.log 2>&1 &
          echo $! > fastapi.pid

      - name: Wait for FastAPI to become ready
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/goals > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "FastAPI did not start in time"
          cat fastapi.log
          exit 1

      - name: Smoke test FastAPI API
        run: |
          python - <<'PY'
          import json
          import urllib.request

          def req(method, url, data=None):
            body = None
            headers = {}
            if data is not None:
              body = json.dumps(data).encode("utf-8")
              headers["Content-Type"] = "application/json"
            r = urllib.request.Request(url, data=body, method=method, headers=headers)
            with urllib.request.urlopen(r, timeout=10) as resp:
              return resp.status, json.loads(resp.read().decode("utf-8"))

          status, goals = req("GET", "http://127.0.0.1:8000/api/goals")
          assert status == 200, status
          assert isinstance(goals, list), type(goals)

          status, created = req(
            "POST",
            "http://127.0.0.1:8000/api/goals",
            {
              "title": "CI test goal",
              "description": "created by github actions",
              "target_date": "2026-03-30"
            },
          )
          assert status == 201, status
          assert created["title"] == "CI test goal", created
          print("FastAPI smoke test passed")
          PY

      - name: Stop FastAPI app
        if: always()
        run: |
          kill "$(cat fastapi.pid)" || true

  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs:
      - lint-syntax-and-tests
      - docker-build-smoke-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'goal-manager' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Validate publish configuration
        run: |
          test -n "${DOCKERHUB_USERNAME}" || (echo "Missing DOCKERHUB_USERNAME in vars or secrets" && exit 1)
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || (echo "Missing DOCKERHUB_TOKEN secret" && exit 1)

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest \
            -t ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:${{ steps.tags.outputs.short_sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:latest
          docker push ${DOCKERHUB_USERNAME}/${DOCKER_IMAGE_NAME}:${{ steps.tags.outputs.short_sha }}
